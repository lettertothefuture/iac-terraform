name: Terraform AWS Setup

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET }}
        aws-region: us-east-1 

    - name: Initialize Terraform
      run: terraform init

    - name: Terraform Import Existing Resources
      run: |
        terraform import aws_ecr_repository.node_repo node-app-repo || true
        terraform import aws_iam_role.ecs_execution_role ecs-execution-role || true
        terraform import aws_iam_role.ecs_task_role ecs-task-role || true
        terraform import aws_s3_bucket.react_site react-site-bucket || true
        terraform import aws_s3_bucket.letter_bucket letter-json-bucket || true

    - name: Terraform Plan
      run: terraform plan

    - name: Terraform Apply
      run: terraform apply -auto-approve